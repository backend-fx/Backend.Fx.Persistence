name: continuous

on:
  push:
    branches:
      - main
    paths:
      - "src/**"

  pull_request:
    branches:
      - main
    paths:
      - "src/**"
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  cake-build:
    name: cake-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install .NET Core SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: cake build
        run: ./build.sh --target=Test


      - name: Test Report
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: Test Results
          path: ${{ github.workspace }}/artifacts/test-results/*.trx
          reporter: dotnet-trx
          fail-on-error: false
          fail-on-empty: false

      - name: Upload Test Results
        uses: actions/upload-artifact@v7.0.1
        if: success() || failure()
        with:
          name: test-results
          path: ${{ github.workspace }}/artifacts/test-results/*.trx
          retention-days: 30
